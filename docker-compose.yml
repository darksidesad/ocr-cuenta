version: "3.8"

services:
  # === PostgreSQL ===
  db:
    image: postgres:15-alpine
    container_name: ocr-dian-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: facturas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: facturas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facturas_user -d facturas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ocr-network

  # === Ollama (LLM local, fallback sin API key) ===
  ollama:
    image: ollama/ollama:latest
    container_name: ocr-dian-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ocr-network

  # === Descargar modelo glm-ocr en Ollama ===
  ollama-init:
    image: ollama/ollama:latest
    container_name: ocr-dian-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "echo 'Descargando modelo glm-ocr...' &&
             ollama pull glm-ocr &&
             echo 'Modelo glm-ocr descargado exitosamente'"
    networks:
      - ocr-network

  # === FastAPI App ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-dian-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://facturas_user:${DB_PASSWORD:-change_me}@db:5432/facturas_db
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ocr-network

  # === Streamlit UI ===
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: ocr-dian-ui
    restart: unless-stopped
    environment:
      API_BASE_URL: http://app:8000
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ocr-network

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local

networks:
  ocr-network:
    driver: bridge
